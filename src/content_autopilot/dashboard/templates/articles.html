{% extends "base.html" %}
{% block title %}기사 목록 — Content Autopilot{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">기사 목록</h1>
<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="min-w-full">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">번호</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">제목</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">소스</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">발행일</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">채널</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-200">
      <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">발행된 기사가 없습니다</td></tr>
    </tbody>
  </table>
</div>
<div class="mt-4 flex justify-center space-x-2">
  <a href="?page={{ page - 1 if page > 1 else 1 }}" class="px-3 py-1 bg-white border rounded text-sm {% if page <= 1 %}text-gray-300{% else %}text-gray-700 hover:bg-gray-50{% endif %}">이전</a>
  <span class="px-3 py-1 bg-blue-600 text-white rounded text-sm">{{ page }}</span>
  <a href="?page={{ page + 1 }}" class="px-3 py-1 bg-white border rounded text-sm text-gray-700 hover:bg-gray-50">다음</a>
</div>
{% endblock %}
